<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB AI Analyzer</title>
    
    <!-- Include KiCanvas Web Component -->
    <script type="module" src="https://kicanvas.org/kicanvas/kicanvas.js"></script>
    
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --danger: #ff4a4a;
            --success: #4caf50;
            --border: #333;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        #sidebar {
            width: 350px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            background-color: #252526;
        }

        #sidebar-header h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            color: #fff;
        }

        #action-btn {
            width: 100%;
            padding: 10px;
            background-color: #007acc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        #action-btn:hover {
            background-color: #005f9e;
        }

        #results-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .flag-card {
            background-color: #2a2a2a;
            border-left: 4px solid var(--danger);
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
        }

        .flag-card:hover {
            background-color: #333;
            transform: translateX(2px);
        }

        .flag-card h3 {
            margin: 0 0 5px 0;
            font-size: 1rem;
            color: var(--danger);
        }

        .flag-card p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Main Canvas Area */
        #main-view {
            flex-grow: 1;
            position: relative;
            background-color: #000;
        }

        kicanvas-embed {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(18, 18, 18, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            display: none;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div id="sidebar-header">
            <h2>AI Agent Analysis</h2>
            <button id="action-btn" onclick="fetchAnalysisResults()">Fetch Latest Analysis</button>
        </div>
        <div id="results-container">
            <p style="color: var(--text-muted); text-align: center; margin-top: 20px;">
                Click "Fetch Latest Analysis" to review board.
            </p>
        </div>
    </div>

    <div id="main-view">
        <div id="loading" class="loading-overlay">Analyzing Board Layout...</div>
        
        <!-- KiCanvas Component pointing to your FastAPI board serving route -->
        <kicanvas-embed id="board-viewer" src="/api/board_file" controls="zoom pan"></kicanvas-embed>
    </div>

    <script>
        // Store the flagged results globally for interaction
        let analysisData = [];

        async function fetchAnalysisResults() {
            const resultsContainer = document.getElementById('results-container');
            const loadingOverlay = document.getElementById('loading');
            
            loadingOverlay.style.display = 'flex';
            resultsContainer.innerHTML = '';

            try {
                // In your architecture, the KiCad plugin POSTs to /api/analyze.
                // We assume you have a GET endpoint to retrieve the most recent results, 
                // OR you can mock the POST here to test the UI.
                
                // For demonstration, we are fetching from a hypothetical GET endpoint
                // that returns the last processed analysis.
                const response = await fetch('/api/results'); 
                
                if (!response.ok) throw new Error('Failed to fetch analysis data.');
                
                analysisData = await response.json();
                
                // Filter to only show flagged components
                const flaggedComponents = analysisData.filter(item => item.flagged);

                if (flaggedComponents.length === 0) {
                    resultsContainer.innerHTML = `
                        <div style="text-align: center; color: var(--success); margin-top: 20px;">
                            <strong>All Clear!</strong><br>No violations found by the AI Agent.
                        </div>`;
                } else {
                    flaggedComponents.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'flag-card';
                        card.innerHTML = `
                            <h3>${item.component.ref_des}</h3>
                            <p><strong>Part:</strong> ${item.component.part_number}</p>
                            <p><strong>Issue:</strong> ${item.message}</p>
                        `;
                        
                        // Add click listener to highlight on the board
                        card.addEventListener('click', () => highlightComponent(item.component.ref_des));
                        resultsContainer.appendChild(card);
                    });
                }
            } catch (error) {
                console.error(error);
                resultsContainer.innerHTML = `
                    <div style="color: var(--danger); text-align: center; margin-top: 20px;">
                        Failed to load analysis.<br>Make sure the backend is running.
                    </div>`;
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }

        function highlightComponent(refDes) {
            const viewer = document.getElementById('board-viewer');
            
            if (!viewer || !viewer.board) {
                console.warn("KiCanvas is not fully initialized yet.");
                return;
            }

            // KiCanvas exposes an API to select and zoom to specific reference designators
            try {
                // Clear previous selections
                viewer.selection = []; 
                
                // Set new selection
                viewer.selection = [refDes];
                
                // Programmatically trigger a zoom to the selected component
                viewer.zoomToSelection();
                
            } catch (error) {
                console.error(`Error highlighting component ${refDes}:`, error);
                
                // Fallback: If the official API isn't exposing zoomToSelection, 
                // you can manipulate the internal shadow DOM (fragile but sometimes necessary)
                const shadowRoot = viewer.shadowRoot;
                if (shadowRoot) {
                    const footprint = shadowRoot.querySelector(`[data-ref="${refDes}"]`);
                    if (footprint) {
                        footprint.classList.add('highlight-error');
                    }
                }
            }
        }
    </script>
</body>
</html>
